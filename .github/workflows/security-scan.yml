name: Security Scan

on:
  schedule:
    # Ejecutar todos los lunes a las 9 AM
    - cron: '0 9 * * 1'
  workflow_dispatch:
  # Solo manual o programado, NO en cada push

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
      
      - name: Scan vulnerabilidades Backend
        working-directory: ./backend
        run: |
          npm audit --audit-level=high --json > backend-audit.json || true
          npm audit --audit-level=high || true
        continue-on-error: true
      
      - name: Scan vulnerabilidades Frontend
        working-directory: ./Frontend
        run: |
          npm audit --audit-level=high --json > frontend-audit.json || true
          npm audit --audit-level=high || true
        continue-on-error: true
      
      - name: Subir reportes
        uses: actions/upload-artifact@v5
        with:
          name: security-reports
          path: |
            backend/backend-audit.json
            Frontend/frontend-audit.json
        if: always()
  
  snyk-scan:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v5
      
      - name: Run Snyk Security Scan
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

      - name: Skip Snyk when token is missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN no configurado; se omite el escaneo de Snyk"
  
  secrets-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scan
        if: ${{ github.event_name == 'push' }}
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

      - name: Omitir TruffleHog en ejecución manual/programada
        if: ${{ github.event_name != 'push' }}
        run: echo "TruffleHog diff-scan solo aplica en pushes; se omite en manual/schedule"
  
  compliance-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v5
      
      - name: Verificar compliance Colombia
        working-directory: ./backend
        run: |
          echo "🇨🇴 Verificando compliance con Ley 1581/2012..."
          
          # Verificar documentos legales
          if [ ! -f "../Legal/POLITICA_TRATAMIENTO_DATOS_COLOMBIA.md" ]; then
            echo "❌ Falta Política de Tratamiento de Datos"
            exit 1
          fi
          
          if [ ! -f "../Legal/CONSENTIMIENTO_INFORMADO_COLOMBIA.md" ]; then
            echo "❌ Falta Consentimiento Informado"
            exit 1
          fi
          
          # Verificar encriptación
          if ! grep -q "AES-256" utils/clinicalCrypto.js; then
            echo "❌ No se detectó encriptación AES-256"
            exit 1
          fi
          
          # Verificar audit logging
          if [ ! -f "middleware/auditLogger.js" ]; then
            echo "❌ Falta audit logging"
            exit 1
          fi
          
          echo "✅ Compliance verificado correctamente"
