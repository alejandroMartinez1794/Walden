name: Deploy a Producción

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'

      - name: Ejecutar tests backend
        working-directory: ./backend
        run: |
          npm ci
          npm test -- --forceExit
        env:
          NODE_ENV: test

  build:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'

      - name: Build Backend
        working-directory: ./backend
        run: |
          npm ci --only=production
          echo "✅ Backend listo para producción"

      - name: Build Frontend
        working-directory: ./Frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_BACKEND_URL: ${{ secrets.PRODUCTION_API_URL }}

      - name: Crear artifact
        uses: actions/upload-artifact@v5
        with:
          name: production-build
          path: |
            backend/
            Frontend/dist/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Deploy Backend a Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          git fetch --unshallow || true
          git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/$HEROKU_APP_NAME.git
          git push heroku HEAD:main -f

      - name: Deploy Frontend a Vercel
        working-directory: ./Frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          vercel --yes --prod --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Verificar deploy
        run: |
          echo "✅ Deploy a producción completado"
          echo "🌐 URL: ${{ secrets.PRODUCTION_URL || 'https://basileia.com' }}"

      - name: Notificar en caso de fallo
        if: failure()
        run: |
          echo "❌ Deploy falló - revisar logs"
          exit 1
