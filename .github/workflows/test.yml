name: Tests

on:
  push:
    branches: [main, basileia, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    # Set NODE_ENV at job level so it's available in ALL steps
    env:
      NODE_ENV: test
    
    strategy:
      matrix:
        node-version: [20.x]
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v5
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          # Disable cache to force fresh install
          # cache: 'npm'
          # cache-dependency-path: backend/package-lock.json
      
      - name: Instalar dependencias
        run: npm ci || npm install
      
      - name: Ejecutar tests
        run: npm test -- --forceExit --detectOpenHandles
        env:
          MONGO_URL: ${{ secrets.MONGO_URL_TEST || 'mongodb://localhost:27017/basileia-test' }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-secret-key-for-ci' }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || 'test-encryption-key-32-bytes-long!!' }}
      
      - name: Generar reporte de cobertura
        run: npm run test:coverage || npm test -- --coverage --forceExit
        continue-on-error: true
      
      - name: Subir cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./backend/coverage
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true
  
  frontend-lint:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./Frontend
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json
      
      - name: Instalar dependencias
        run: npm ci
      
      - name: Lint check
        run: npm run lint || echo "Lint no configurado, saltando..."
        continue-on-error: true
      
      - name: Build check
        run: npm run build
        env:
          VITE_BACKEND_URL: https://api.basileia.com/api/v1
  
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v5
      
      - name: Backend - Audit de seguridad
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true
      
      - name: Frontend - Audit de seguridad
        working-directory: ./Frontend
        run: npm audit --audit-level=moderate || true
  
  test-summary:
    needs: [backend-tests, frontend-lint, security-audit]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Resumen de tests
        run: |
          echo "📊 Resumen de CI/CD:"
          echo "Backend tests: ${{ needs.backend-tests.result }}"
          echo "Frontend lint: ${{ needs.frontend-lint.result }}"
          echo "Security audit: ${{ needs.security-audit.result }}"
          
          # Solo falla si backend-tests falló (frontend y security son opcionales)
          if [ "${{ needs.backend-tests.result }}" == "failure" ]; then
            echo "❌ Backend tests fallaron - revisar logs"
            exit 1
          elif [ "${{ needs.backend-tests.result }}" == "success" ]; then
            echo "✅ Todos los tests críticos pasaron"
          fi
