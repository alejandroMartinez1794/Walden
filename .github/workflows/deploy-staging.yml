name: Deploy a Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      HEROKU_STAGING_APP_NAME: ${{ secrets.HEROKU_STAGING_APP_NAME }}
      HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Instalar dependencias Backend
        working-directory: ./backend
        run: npm ci --only=production

      - name: Build Frontend
        if: ${{ env.STAGING_API_URL != '' }}
        working-directory: ./Frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_BACKEND_URL: ${{ secrets.STAGING_API_URL }}

      - name: Omitir build de staging por secretos faltantes
        if: ${{ env.STAGING_API_URL == '' }}
        run: echo "STAGING_API_URL no configurado; se omite build de staging"

      - name: Deploy Backend a Heroku (Staging)
        if: ${{ env.HEROKU_API_KEY != '' && env.HEROKU_STAGING_APP_NAME != '' && env.HEROKU_EMAIL != '' }}
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_STAGING_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
        continue-on-error: true

      - name: Omitir deploy de staging por secretos faltantes
        if: ${{ env.HEROKU_API_KEY == '' || env.HEROKU_STAGING_APP_NAME == '' || env.HEROKU_EMAIL == '' }}
        run: echo "Faltan secretos de staging en Heroku; se omite deploy"

      - name: Notificar deploy exitoso
        if: success()
        run: |
          echo "✅ Deploy a staging exitoso"
          echo "URL: ${{ secrets.STAGING_URL || 'https://staging.basileia.com' }}"
