name: Deploy a Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Instalar dependencias Backend
        working-directory: ./backend
        run: npm ci --only=production

      - name: Build Frontend
        working-directory: ./Frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}

      - name: Deploy Backend a Heroku (Staging)
        if: ${{ secrets.HEROKU_API_KEY }}
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_STAGING_APP_NAME }}
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
        continue-on-error: true

      - name: Notificar deploy exitoso
        if: success()
        run: |
          echo "✅ Deploy a staging exitoso"
          echo "URL: ${{ secrets.STAGING_URL || 'https://staging.basileias.com' }}"
