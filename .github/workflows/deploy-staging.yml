name: Deploy a Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Instalar dependencias Backend
        working-directory: ./backend
        run: npm ci --only=production
      
      - name: Build Frontend
        working-directory: ./Frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}
      
      # Ejemplo con Railway/Render (ajustar según plataforma)
      - name: Deploy a Railway
        if: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true
      
      # Ejemplo con Render
      - name: Deploy a Render
        if: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
        continue-on-error: true
      
      - name: Notificar deploy exitoso
        if: success()
        run: |
          echo "✅ Deploy a staging exitoso"
          echo "URL: ${{ secrets.STAGING_URL || 'https://staging.basileias.com' }}"
